services:
  - type: web
    name: ai-native-microservice
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: ENVIRONMENT
        value: production
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: DEFAULT_PROVIDER
        value: balanced
      - key: DAILY_REQUEST_TARGET
        value: "4000"
      - key: SERVICE_LEVEL_LATENCY_MS
        value: "500"
