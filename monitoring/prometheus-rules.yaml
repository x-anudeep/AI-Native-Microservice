groups:
  - name: ai-native-api
    rules:
      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum(rate(ai_native_request_latency_seconds_bucket[5m])) by (le)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency is above 500ms
      - alert: ProviderCostSpike
        expr: increase(ai_native_provider_cost_usd_total[1h]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Provider spend increased quickly over the last hour
