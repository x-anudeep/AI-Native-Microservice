apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-native-api
  namespace: ai-native
  labels:
    app: ai-native-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-native-api
  template:
    metadata:
      labels:
        app: ai-native-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/v1/metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: ai-native-api
      containers:
        - name: api
          image: ghcr.io/x-anudeep/ai-native-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ai-native-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
