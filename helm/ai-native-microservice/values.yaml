replicaCount: 2

image:
  repository: ghcr.io/x-anudeep/ai-native-microservice
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

config:
  environment: production
  maxUploadMb: "25"
  dailyRequestTarget: "4000"
  serviceLevelLatencyMs: "500"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
