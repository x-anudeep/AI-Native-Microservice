apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-native.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ai-native.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ai-native.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ai-native.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/v1/metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: {{ include "ai-native.fullname" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "ai-native.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
